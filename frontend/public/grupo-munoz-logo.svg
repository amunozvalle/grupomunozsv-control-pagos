<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <defs>
    <radialGradient id="badgeGrad" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#2B5BB8"/>
      <stop offset="100%" stop-color="#1B3472"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF9A3C"/>
      <stop offset="100%" stop-color="#E8680A"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ -->
  <!--        BADGE / MARK            -->
  <!-- ═══════════════════════════════ -->

  <!-- Outer glow ring -->
  <circle cx="150" cy="150" r="138" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <!-- Main navy circle -->
  <circle cx="150" cy="150" r="124" fill="url(#badgeGrad)"/>
  <!-- Inner white accent ring -->
  <circle cx="150" cy="150" r="112" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- ── Chimney (behind roof) ── -->
  <rect x="168" y="55" width="16" height="34" fill="url(#orangeGrad)" rx="2"/>

  <!-- ── Roof ── -->
  <polygon points="150,52 62,138 238,138" fill="url(#orangeGrad)"/>
  <!-- Roof highlight edge -->
  <polygon points="150,52 62,138 238,138" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ── House body ── -->
  <rect x="75" y="138" width="150" height="94" fill="white" rx="2"/>

  <!-- ── Arched door (navy) ── -->
  <path d="M 122,232 L 122,183 A 28,28 0 0 1 178,183 L 178,232 Z" fill="url(#badgeGrad)"/>
  <!-- Door knob -->
  <circle cx="170" cy="210" r="3.5" fill="rgba(255,255,255,0.5)"/>

  <!-- ── Left window ── -->
  <rect x="84" y="150" width="28" height="24" fill="url(#orangeGrad)" rx="3"/>
  <line x1="84" y1="162" x2="112" y2="162" stroke="white" stroke-width="1.5"/>
  <line x1="98" y1="150" x2="98" y2="174" stroke="white" stroke-width="1.5"/>

  <!-- ── Right window ── -->
  <rect x="188" y="150" width="28" height="24" fill="url(#orangeGrad)" rx="3"/>
  <line x1="188" y1="162" x2="216" y2="162" stroke="white" stroke-width="1.5"/>
  <line x1="202" y1="150" x2="202" y2="174" stroke="white" stroke-width="1.5"/>

  <!-- ── Saw blade detail (bottom right of badge) ── -->
  <g transform="translate(222, 210)">
    <!-- Gear teeth path: 12 teeth, outer r=26, inner r=19 -->
    <path d="
      M 22.5,13 L 26,0 L 13,3.5
      L 13,-3.5 L 26,0 L 22.5,-13
      L 13,-13 L 19,-22.5 L 8,-19
      L 3.5,-26 L 0,-13 L -3.5,-26
      L -8,-19 L -19,-22.5 L -13,-13
      L -22.5,-13 L -26,0 L -22.5,13
      L -13,13 L -19,22.5 L -8,19
      L -3.5,26 L 0,13 L 3.5,26
      L 8,19 L 19,22.5 L 13,13 Z
    " fill="url(#orangeGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="15" fill="url(#badgeGrad)"/>
    <circle cx="0" cy="0" r="4.5" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!--        TYPOGRAPHY              -->
  <!-- ═══════════════════════════════ -->

  <!-- "GRUPO" label -->
  <text x="320" y="100"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="20" font-weight="900"
    fill="#E8680A" letter-spacing="15">GRUPO</text>

  <!-- "MUÑOZ" main wordmark -->
  <text x="314" y="198"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="102" font-weight="900"
    fill="#1B3472" letter-spacing="2">MU&#209;OZ</text>

  <!-- Orange separator line with dots -->
  <rect x="320" y="213" width="475" height="3.5" fill="url(#orangeGrad)" rx="2"/>

  <!-- Subtitle -->
  <text x="320" y="246"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15" fill="#8899BB"
    font-weight="400" letter-spacing="5.5">CARPINTER&#205;A  &#183;  VIDRIER&#205;A</text>

  <!-- Tagline -->
  <text x="322" y="272"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11.5" fill="#AABBCC"
    font-weight="300" letter-spacing="3">CALIDAD  &#183;  CONFIANZA  &#183;  EXPERIENCIA</text>
</svg>
